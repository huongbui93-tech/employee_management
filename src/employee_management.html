<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee management</title>
</head>
<body>
<input id="searchInput" placeholder="Search..." />

<label>
    <input type="checkbox" id="togglePosition" />
    Search by position
</label>

<div id="positionFilter" style="display:none;"></div>

<button id="seeAllBtn">See all</button>
<button onclick="openAddModal()">Add new</button>

<table border="1">
    <thead>
    <tr>
        <th>
            <input type="checkbox" id="checkAll">
        </th>
        <th>ID</th>
        <th>Name</th>
        <th>BirthYear</th>
        <th>Address</th>
        <th>Account</th>
        <th>Position</th>
        <th>Start date</th>
        <th>End date</th>
    </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<div id="pagination"></div>

<button id="editBtn" disabled>Edit</button>
<button id="deleteBtn" disabled>Delete</button>

<!-- Modal -->
<div id="editModal" style="display:none; position:fixed; top:20%; left:30%; background:#fff; padding:20px; border:1px solid #ccc;">
    <h3>Edit Employee</h3>

    <input type="text" id="editName" placeholder="Name"><br><br>
    <input type="number" id="editBirthYear" placeholder="Birth Year"><br><br>
    <input type="text" id="editProvince" placeholder="Province"><br><br>
    <input type="text" id="editCity" placeholder="City"><br><br>
    <input type="text" id="editAccount" placeholder="Account"><br><br>

    <button id="saveEdit">Save</button>
    <button onclick="closeModal()">Cancel</button>
</div>

<script src="Load_data.js"></script>
<script src="See_all.js"></script>
<script src="pagination.js"></script>
<script src="Edit_delete.js"></script>
</body>
</html>
